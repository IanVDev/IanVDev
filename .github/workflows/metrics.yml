name: IanVDev OS Card

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Generate IanVDev OS card
        env:
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: python .github/scripts/generate_card.py

      - name: Commit card
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ianvdev-os.svg
          git diff --cached --quiet || git commit -m "chore: update IanVDev OS card [skip ci]"
          git push
